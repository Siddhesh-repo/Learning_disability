version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./backend/models:/app/models
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5001
